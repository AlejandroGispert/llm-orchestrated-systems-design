name: Daily Concept Design Agent

on:
  schedule:
    # Once per day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:   # Manual trigger from Actions tab

permissions:
  contents: write
  issues: write

jobs:
  daily_agent_session:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "agentic-design-lab[bot]"
          git config user.email "agentic-design-lab[bot]@users.noreply.github.com"

      - name: Run evolution session
        id: daily_agent_session
        continue-on-error: true
        env:
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-3-7-sonnet-latest
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/daily_agent_session.sh
          ./scripts/daily_agent_session.sh

      - name: Retry on failure
        if: steps.daily_agent_session.outcome == 'failure'
        env:
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-3-7-sonnet-latest
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Retrying after 2 minutes.."
          sleep 120
          ./scripts/daily_agent_session.sh
